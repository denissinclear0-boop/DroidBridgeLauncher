plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.droidbridgelauncher'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.droidbridgelauncher"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0-MTW"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    
    // MTW Integration
    implementation project(':mtw:ltw')
    
    // Methods Injector (if needed)
    // implementation project(':methods_injector_agent')
}
