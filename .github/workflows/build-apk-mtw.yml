name: Build APK - DroidBridgeLauncher

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout DroidBridgeLauncher
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
      
      - name: Update settings.gradle (remove MTW)
        run: |
          cat > settings.gradle << 'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "DroidBridgeLauncher"
include ':app'
include ':methods_injector_agent'
EOF
      
      - name: Update app/build.gradle (remove MTW dependency)
        run: |
          cat > app/build.gradle << 'EOF'
plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.droidbridgelauncher'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.droidbridgelauncher"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0-OfflineSupport"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
EOF
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Release APK
        run: ./gradlew clean assembleRelease --stacktrace
      
      - name: Find APK file
        id: find_apk
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found"
            exit 1
          fi
          echo "APK_PATH=$APK" >> $GITHUB_OUTPUT
          echo "APK_NAME=$(basename $APK)" >> $GITHUB_OUTPUT
      
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: DroidBridgeLauncher-OfflineSupport
          path: ${{ steps.find_apk.outputs.APK_PATH }}
          retention-days: 30
      
      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.find_apk.outputs.APK_PATH }}
          tag_name: v${{ github.run_number }}-offline-${{ github.run_id }}
          name: "Build #${{ github.run_number }} - Offline Support"
          body: |
            ✅ **APK compilado con soporte OFFLINE mejorado**
            
            📦 Archivo: `${{ steps.find_apk.outputs.APK_NAME }}`
            🔧 Commit: ${{ github.sha }}
            
            **Cambios:**
            - ✅ Soporte completo para cuentas OFFLINE
            - ✅ Vista de skin habilitada para cuentas offline
            - ✅ Launcher optimizado
            
            **Instalación:**
            1. Descarga el APK
            2. Abre en tu móvil o instala con: `adb install app.apk`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
