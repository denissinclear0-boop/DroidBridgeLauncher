name: Build APK with MTW

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout DroidBridgeLauncher
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Checkout MTW Repository
        run: |
          mkdir -p modules
          git clone https://github.com/denissinclear0-boop/MTW.git modules/mtw
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          ndk-version: 28.2.13676358
      
      - name: Check and create settings.gradle
        run: |
          if [ ! -f "settings.gradle" ]; then
            cat > settings.gradle << 'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "DroidBridgeLauncher"
include ':app'
include ':methods_injector_agent'
include ':mtw:ltw'
EOF
          else
            if ! grep -q "include ':mtw:ltw'" settings.gradle; then
              echo "include ':mtw:ltw'" >> settings.gradle
            fi
          fi
      
      - name: Check and update app/build.gradle
        run: |
          if [ ! -f "app/build.gradle" ]; then
            echo "app/build.gradle not found"
          else
            if ! grep -q "implementation project(':mtw:ltw')" app/build.gradle; then
              # Insert before the last closing brace
              sed -i '/^}/i\    implementation project('"'"':mtw:ltw'"'"')' app/build.gradle
            fi
          fi
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Release APK
        run: |
          ./gradlew clean assembleRelease --stacktrace
      
      - name: Find APK file
        id: find_apk
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found"
            exit 1
          fi
          echo "APK_PATH=$APK" >> $GITHUB_OUTPUT
          echo "APK_NAME=$(basename $APK)" >> $GITHUB_OUTPUT
      
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: DroidBridgeLauncher-MTW
          path: ${{ steps.find_apk.outputs.APK_PATH }}
          retention-days: 30
      
      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.find_apk.outputs.APK_PATH }}
          tag_name: v${{ github.run_number }}-mtw-${{ github.run_id }}
          name: "Build #${{ github.run_number }} - MTW Integration"
          body: |
            ✅ **APK compilado exitosamente con MTW integrado**
            
            📦 Archivo: `${{ steps.find_apk.outputs.APK_NAME }}`
            🔧 Commit: ${{ github.sha }}
            
            **Características:**
            - Integración completa de MTW (rendering layer optimizado)
            - Compilado automáticamente desde GitHub Actions
            - APK listo para instalar
            
            **Instalación:**
            1. Descarga el APK
            2. Abre en tu móvil o instala con: `adb install app.apk`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **APK compilado exitosamente con MTW**\n\n📥 Descárgalo en la sección de Artifacts arriba o en [Releases](https://github.com/${{ github.repository }}/releases)'
            })
